<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RVCM Worship Chords</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; transition: background 0.2s; }

  body.dark .section-label { color: #555; }
  body.dark .section-input { background: #222; border-color: #2a2a2a; color: #f0f0f0; }
  body.dark .section-input:focus { border-color: #555; background: #2a2a2a; }
  body.dark .chord-preview-key { color: #555; }
  body.dark .chord-preview-chords { color: #60a5fa; }
  body.dark .band-song-title, body.dark .capo-song-title, body.dark .capo-fret { color: #f0f0f0; }
  body.dark .band-key-badge { background: #1e3a5f; color: #60a5fa; }
  body.dark .band-section { background: #222; border-color: #2a2a2a; }
  body.dark .band-section-name, body.dark .capo-section-name { color: #9ca3af; }
  body.dark .band-chord, body.dark .capo-chord { color: #f0f0f0; }
  body.dark .band-key-row-label { color: #555; }
  body.dark .key-group-block { background: #222; border-color: #2a2a2a; }

  body.dark .capo-card { border-color: #2a2a2a; }
  body.dark .capo-song-key { color: #555; }

  body.dark .capo-key-header { color: #555; }
  body.dark .sync-indicator { color: #333; }
  body.dark .empty-section { color: #444; }
  body.dark .lineup-song-row { border-color: #2a2a2a; }
  body.dark .lineup-song-name { color: #f0f0f0; }
  body.dark .lineup-song-key { color: #555; }
  body.dark .lineup-yt-input { background: #222; border-color: #2a2a2a; color: #f0f0f0; }
  body.dark .lineup-yt-link { color: #60a5fa; }
  body.dark .lineup-empty { color: #444; }
  body.dark .lineup-yt-input { background: #222; border-color: #2a2a2a; color: #f0f0f0; }
  body.dark .lineup-thumb-expand { color: #555; }
  body.dark .lineup-thumb-expand:hover { color: #60a5fa; }

  .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e5e5e5; font-size: 12px; color: #888; }
  .status-date { position: absolute; left: 50%; transform: translateX(-50%); }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; }
  .status-dot.connected { background: #22c55e; }
  .status-dot.syncing { background: #f59e0b; }
  .rvcm-btn { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 4px 12px; cursor: pointer; color: #111; user-select: none; }

  .app { max-width: 700px; margin: 0 auto; padding: 16px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; flex-wrap: wrap; }
  .mode-toggle { display: flex; border: 1px solid #d1d5db; border-radius: 8px; overflow: hidden; }
  .mode-btn { padding: 7px 18px; font-size: 13px; border: none; background: #f9fafb; color: #6b7280; cursor: pointer; }
  .mode-btn.active { background: #1d4ed8; color: #fff; font-weight: 500; }

  .tabs { display: flex; gap: 0; margin-bottom: 0; flex-wrap: wrap; padding: 0 4px; }
  .tab-btn { padding: 8px 14px; border: 1px solid #d1d5db; border-bottom: none; border-radius: 8px 8px 0 0; background: #f0f0f0; color: #6b7280; font-size: 13px; cursor: pointer; margin-right: 4px; position: relative; bottom: -1px; }

 .edit-reorder-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 6px 0 12px;
}

.edit-reorder-btn {
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid #bfdbfe;
  border-radius: 7px;
  background: #eff6ff;
  color: #1d4ed8;
  cursor: pointer;
  font-weight: 600;
}

.edit-reorder-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.edit-reorder-label {
  font-size: 12px;
  color: #9ca3af;
  font-weight: 600;
}

body.dark .edit-reorder-btn {
  background: #1e3a5f;
  border-color: #2563eb;
  color: #60a5fa;
}

body.dark .edit-reorder-label {
  color: #555;
}

@media (max-width: 600px) {
  .edit-reorder-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    width: 100%;
  }

  .edit-reorder-btn {
    height: 34px;
    padding: 0 8px;
    font-size: 11px;
  }

  .edit-reorder-label {
    font-size: 11px;
    white-space: nowrap;
  }
}
 
  .tab-btn.active { color: #111; border-color: #d1d5db; border-bottom: 1px solid #fff; background: #fff; font-weight: 500; z-index: 1; }
  body.dark .tab-btn { background: #111; border-color: #2a2a2a; color: #555; }
  body.dark .tab-btn.active { background: #1a1a1a; color: #f0f0f0; border-color: #444; border-bottom-color: #1a1a1a; }

  .reset-btn { font-size: 11px; padding: 4px 9px; border: 1px solid #fca5a5; border-radius: 6px; background: #fff5f5; color: #ef4444; cursor: pointer; white-space: nowrap; }
  .reset-btn:hover { background: #fee2e2; }
  body.dark .reset-btn { background: #2a1a1a; border-color: #7f1d1d; color: #f87171; }
  body.dark .reset-btn:hover { background: #3a1a1a; }

  /* EDIT */
  .song-panel { background: #fff; border: 1px solid #d1d5db; border-radius: 0 12px 12px 12px; padding: 16px 20px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
  .song-title-input { font-size: 16px; font-weight: 600; border: none; background: transparent; color: #111; outline: none; flex: 1; min-width: 120px; }
  .key-selector { display: flex; gap: 4px; flex-wrap: wrap; }
  .key-btn { padding: 4px 9px; font-size: 11px; border: 1px solid #d1d5db; border-radius: 6px; background: #f9fafb; color: #6b7280; cursor: pointer; }
  .key-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; font-weight: 500; }
  .key-btn.dash { color: #d1d5db; border-color: #e5e7eb; }
  .key-btn.dash.active { background: #f3f4f6; color: #9ca3af; border-color: #d1d5db; font-weight: 600; }
  body.dark .key-btn.dash { color: #444; border-color: #333; }
  body.dark .key-btn.dash.active { background: #2a2a2a; color: #666; border-color: #444; }
  .divider { height: 1px; background: #f3f4f6; margin: 12px 0; }
  .sections { display: flex; flex-direction: column; gap: 10px; }
  .section-row { display: grid; grid-template-columns: 100px 1fr; gap: 8px; align-items: start; }
  .section-label { font-size: 12px; color: #9ca3af; padding-top: 8px; }
  .section-input { font-size: 13px; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #111; width: 100%; outline: none; font-family: 'SF Mono', 'Fira Code', monospace; resize: none; overflow: hidden; min-height: 34px; line-height: 1.6; }
  .section-input:focus { border-color: #6b7280; background: #fff; }
  .chord-preview-wrap { min-height: 0; margin-top: 4px; }
  .chord-preview-key-block { padding: 4px 0; border-bottom: 1px solid #f3f4f6; }
  .chord-preview-key-block:last-child { border-bottom: none; }
  .chord-preview-key-label { font-size: 10px; color: #9ca3af; font-weight: 700; margin-bottom: 2px; }
  .chord-preview-line { display: flex; align-items: baseline; gap: 6px; padding: 1px 0; }
  .chord-preview-linenum { font-size: 10px; color: #d1d5db; min-width: 10px; }
  .chord-preview-chords { font-size: 13px; color: #1d4ed8; font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.03em; }

  /* NOTES */
  .notes-input { font-size: 13px; padding: 7px 10px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #9ca3af; width: 100%; outline: none; font-family: inherit; resize: none; overflow: hidden; min-height: 34px; line-height: 1.6; margin-top: 4px; transition: border-color 0.15s, background 0.15s, color 0.15s; }
  .notes-input:focus { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
  .notes-input.has-content { border: 1px solid #fde68a; background: #fffbeb; color: #92400e; }
  .notes-input::placeholder { color: #9ca3af; opacity: 0.8; }
  .notes-label { font-size: 11px; font-weight: 600; color: #d97706; letter-spacing: 0.05em; margin-top: 14px; margin-bottom: 3px; display: block; }
  body.dark .notes-input { background: #222; border-color: #2a2a2a; color: #555; }
  body.dark .notes-input:focus { background: #3a2800; border-color: #f59e0b; color: #fcd34d; }
  body.dark .notes-input.has-content { background: #2a1f00; border-color: #78350f; color: #fcd34d; }
  body.dark .notes-input::placeholder { color: #555; opacity: 0.8; }
  body.dark .notes-label { color: #f59e0b; }
  .lineup-notes { font-size: 13px; color: #92400e; background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 5px 9px; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; }
  body.dark .lineup-notes { background: #2a1f00; border-color: #78350f; color: #fcd34d; }

  /* BAND */
  .band-screen { background: #fff; border: 1px solid #d1d5db; border-radius: 0 12px 12px 12px; padding: 20px; }
  .band-song-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .band-keys-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .band-key-badge { display: inline-block; font-size: 12px; padding: 3px 10px; background: #eff6ff; color: #1d4ed8; border-radius: 6px; font-weight: 500; }
  .band-sections { display: flex; flex-direction: column; gap: 12px; }
  .band-section { padding: 12px 14px; border-radius: 10px; border: 1px solid #f3f4f6; background: #fafafa; }
  .band-section-name { font-size: 11px; color: #6b7280; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
  .key-group-block { background: #f0f4ff; border: 1px solid #e0e7ff; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .key-group-block:last-child { margin-bottom: 0; }
  .key-group-label { font-size: 10px; font-weight: 700; color: #6b7280; letter-spacing: 0.08em; margin-bottom: 4px; }
  .band-chord-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; padding: 2px 0; }
  .band-chord-line + .band-chord-line { border-top: 1px dashed #e5e7eb; margin-top: 4px; padding-top: 6px; }
  body.dark .band-chord-line + .band-chord-line { border-color: #2a2a2a; }
  .band-chord-group { display: inline-flex; align-items: baseline; gap: 2px; }
  .band-chord { font-size: 26px; font-weight: 600; color: #111; line-height: 1.2; }
  .band-num { font-size: 10px; color: #111; opacity: 0.2; margin-left: 1px; }
  .empty-section { color: #9ca3af; font-size: 13px; font-style: italic; }

  .band-key-block { margin-bottom: 16px; }
  .band-key-block:last-child { margin-bottom: 0; }
  .band-key-block--divider { padding-top: 16px; border-top: 1px solid #f3f4f6; }
  body.dark .band-key-block--divider { border-color: #2a2a2a; }
  .band-key-header { font-size: 12px; font-weight: 700; color: #6b7280; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  body.dark .band-key-header { color: #555; }

  /* CAPO */
  .capo-screen { background: #fff; border: 1px solid #d1d5db; border-radius: 0 12px 12px 12px; padding: 20px; }
  .capo-song-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 2px; }
  .capo-song-key { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
  .capo-options { display: flex; flex-direction: column; gap: 16px; }
  .capo-key-header { font-size: 12px; font-weight: 700; color: #6b7280; letter-spacing: 0.06em; margin-bottom: 8px; text-transform: uppercase; }
  .capo-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; }
  .capo-card:last-child { margin-bottom: 0; }
  .capo-fret { font-size: 22px; font-weight: 600; color: #111; line-height: 1.2; }
  .capo-fret span { font-size: 13px; font-weight: 400; color: #6b7280; margin-left: 4px; }
  .capo-section-block { padding: 8px 12px; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; margin-top: 8px; }
  .capo-section-name { font-size: 11px; color: #6b7280; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .capo-chord-line { display: flex; gap: 10px; flex-wrap: wrap; align-items: baseline; padding: 2px 0; }
  .capo-chord-line + .capo-chord-line { border-top: 1px dashed #e5e7eb; margin-top: 4px; padding-top: 6px; }
  body.dark .capo-chord-line + .capo-chord-line { border-color: #2a2a2a; }
  .capo-chord-group { display: inline-flex; align-items: baseline; gap: 2px; }
  .capo-chord { font-size: 22px; font-weight: 600; color: #111; }
  .capo-num { font-size: 10px; color: #111; opacity: 0.2; }
  .capo-key-divider { height: 1px; background: #f3f4f6; margin: 12px 0; }

  /* LINEUP */
  .lineup-screen { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
  .lineup-song-row { padding: 14px 0; border-bottom: 1px solid #f3f4f6; display: flex; gap: 12px; align-items: flex-start; }
  .lineup-song-row:last-child { border-bottom: none; padding-bottom: 0; }
  .lineup-num { font-size: 37px; font-weight: 700; color: #e5e7eb; width: 46px; flex-shrink: 0; line-height: 1; padding-top: 2px; }
  body.dark .lineup-num { color: #2a2a2a; }
  .lineup-card { flex: 1; min-width: 0; display: flex; gap: 10px; align-items: flex-start; }
  .lineup-info { flex: 1; min-width: 0; }
  .lineup-song-name { font-size: 27px; font-weight: 600; color: #111; margin-bottom: 1px; }
  .lineup-song-key { font-size: 20px; color: #6b7280; margin-bottom: 8px; }
  .lineup-yt-input { width: 100%; font-size: 12px; padding: 5px 9px; border: 1px solid #e5e7eb; border-radius: 7px; background: #f9fafb; color: #111; outline: none; font-family: monospace; }
  .lineup-yt-input:focus { border-color: #6b7280; background: #fff; }
  .lineup-thumb { flex-shrink: 0; width: 112px; }
  .lineup-thumb-video { width: 112px; height: 63px; border-radius: 7px; overflow: hidden; position: relative; background: #000; cursor: pointer; }
  .lineup-thumb-video iframe { width: 200%; height: 200%; border: none; display: block; transform: scale(0.5); transform-origin: top left; pointer-events: none; }
  .lineup-thumb-expand { display: block; text-align: center; font-size: 10px; color: #6b7280; margin-top: 3px; cursor: pointer; text-decoration: none; }
  .lineup-thumb-expand:hover { color: #1d4ed8; }
  .lineup-embed { margin-top: 8px; border-radius: 8px; overflow: hidden; display: none; }
  .lineup-embed.open { display: block; }
  .lineup-embed iframe { width: 100%; height: 180px; border: none; display: block; }
  .lineup-empty { color: #9ca3af; font-size: 13px; font-style: italic; }

  /* LEADER SELECTOR */
  .lineup-leader-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .lineup-leader-label { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  .leader-select { font-size: 12px; padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 6px; background: #f9fafb; color: #111; outline: none; cursor: pointer; }
  .leader-select:focus { border-color: #6b7280; }
  .leader-select.picked { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; font-weight: 500; }
  body.dark .leader-select { background: #222; border-color: #333; color: #f0f0f0; }
  body.dark .leader-select.picked { background: #1e3a5f; border-color: #2563eb; color: #60a5fa; }

  /* NOTES IN LINEUP */
  .lineup-notes-input { width: 100%; font-size: 12px; padding: 5px 9px; border: 1px solid #e5e7eb; border-radius: 7px; background: #f9fafb; color: #9ca3af; outline: none; font-family: inherit; resize: none; overflow: hidden; min-height: 30px; line-height: 1.5; margin-top: 6px; transition: border-color 0.15s, background 0.15s, color 0.15s; }
  .lineup-notes-input:focus { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
  .lineup-notes-input.has-content { border-color: #fde68a; background: #fffbeb; color: #92400e; }
  .lineup-notes-input::placeholder { color: #9ca3af; opacity: 0.8; }
  body.dark .lineup-notes-input { background: #222; border-color: #2a2a2a; color: #555; }
  body.dark .lineup-notes-input:focus { background: #3a2800; border-color: #f59e0b; color: #fcd34d; }
  body.dark .lineup-notes-input.has-content { background: #2a1f00; border-color: #78350f; color: #fcd34d; }
  body.dark .lineup-notes-input::placeholder { color: #555; opacity: 0.8; }

  /* OVERVIEW TOGGLE */
  .lineup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .overview-btn { font-size: 18px; background: none; border: 1px solid #e5e7eb; border-radius: 8px; padding: 4px 10px; cursor: pointer; color: #9ca3af; line-height: 1; transition: all 0.15s; }
  .overview-btn:hover { border-color: #9ca3af; color: #6b7280; }
  .overview-btn.active { border-color: #1d4ed8; color: #1d4ed8; background: #eff6ff; }
  body.dark .overview-btn { border-color: #333; color: #555; background: none; }
  body.dark .overview-btn.active { border-color: #2563eb; color: #60a5fa; background: #1e3a5f; }
  .lineup-screen.overview .lineup-leader-row,
  .lineup-screen.overview .lineup-yt-input,
  .lineup-screen.overview .lineup-embed,
  .lineup-screen.overview .lineup-thumb { display: none !important; }
  .lineup-screen.overview .lineup-notes-input { display: none !important; }
  .lineup-screen.overview .lineup-song-name { font-size: 22px; margin-bottom: 0; }
  .lineup-screen.overview .lineup-song-key { font-size: 16px; margin-bottom: 2px; }
  .lineup-screen.overview .lineup-song-row { padding: 10px 0; }
  .lineup-screen.overview .lineup-num { font-size: 28px; width: 36px; }
  .overview-notes { display: none; font-size: 12px; color: #92400e; background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 4px 9px; margin-top: 4px; line-height: 1.5; white-space: pre-wrap; }
  .lineup-screen.overview .overview-notes.has-content { display: block; }
  body.dark .overview-notes { background: #2a1f00; border-color: #78350f; color: #fcd34d; }
  .overview-date { font-size: 13px; font-weight: 600; color: #111; }
  body.dark .overview-date { color: #f0f0f0; }

  /* BAND ROSTER SECTION */
  .band-roster { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px 20px; margin-top: 16px; }
  body.dark .band-roster { background: #1a1a1a; border-color: #2a2a2a; }
  .band-roster-title { font-size: 12px; font-weight: 700; color: #6b7280; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  body.dark .band-roster-title { color: #555; }
  .roster-grid { display: flex; flex-direction: column; gap: 8px; }
  .roster-row { display: flex; align-items: center; gap: 10px; }
  .roster-instrument { font-size: 12px; color: #6b7280; width: 72px; flex-shrink: 0; }

const SCALE = {

};

function getNoteOnly(chord) {
  const m = chord.match(/^([A-G](?:#|b)?)/);
  return m ? m[1] : chord;
}

function shiftNote(note, steps, preferFlats = false) {
  const sharpNotes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const flatNotes  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

  let index = sharpNotes.indexOf(note);
  if (index === -1) index = flatNotes.indexOf(note);
  if (index === -1) return note;

  const newIndex = ((index + steps) % 12 + 12) % 12;

  return preferFlats ? flatNotes[newIndex] : sharpNotes[newIndex];
}

function parseChordPart(part, scale) {
  // New system:
  // 3     = B in key of G
  // 3m    = Bm
  // 37    = B7
  // 3m7   = Bm7
  // b3    = Bb
  // #4    = C#
  //
  // Also still supports old style:
  // 3b    = Bb
  // 3#    = C

  let match = part.match(/^([b#]?)([1-7])([b#]?)(.*)$/);
  if (!match) return part;

  const prefixAccidental = match[1];
  const number = match[2];
  const suffixAccidental = match[3];
  const suffix = match[4];

  let note = getNoteOnly(scale[parseInt(number) - 1]);

  const accidental = prefixAccidental || suffixAccidental;

  if (accidental === 'b') {
    note = shiftNote(note, -1, true);
  } else if (accidental === '#') {
    note = shiftNote(note, 1, false);
  }

  return note + suffix;
}

function parseToken(n, scale) {
  const [mainPart, bassPart] = n.split('/');

  const chord = parseChordPart(mainPart, scale);

  if (!bassPart) {
    return { num: n, chord };
  }

  const bassNote = parseChordPart(bassPart, scale);

  return {
    num: n,
    chord: chord + '/' + getNoteOnly(bassNote)
  };
}

function numToLines(input, key) {
  const scale = SCALE[key] || SCALE['C'];
  return (input || '').split('\n').map(l => l.trim()).filter(l => l).map(line =>
    line.split(/\s+/).map(n => parseToken(n, scale))
  );
}
function numToChords(input, key) { return numToLines(input, key).flat(); }
function numToString(input, key) {
  return numToLines(input, key).map(line => line.map(x => x.chord).join('  ')).join(' | ');
}
function transposeChord(chord, st) {
  const m = chord.match(/^([A-G][#]?)(.*)$/);
  if (!m) return chord;
  const realKeys = KEYS.filter(k => k !== '—');
  const idx = realKeys.indexOf(m[1]);
  if (idx === -1) return chord;
  return realKeys[((idx - st) % 12 + 12) % 12] + m[2];
}
function getCapoOptions(songKey) {
  const realKeys = KEYS.filter(k => k !== '—');
  const ki = realKeys.indexOf(songKey);
  const opts = [];
  const cG = ((ki - realKeys.indexOf('G')) % 12 + 12) % 12;
  const cC = ((ki - realKeys.indexOf('C')) % 12 + 12) % 12;
  if (cG >= 2 && cG <= 8) opts.push({ fret: cG, shape: 'G' });
  if (cC >= 2 && cC <= 8 && cC !== cG) opts.push({ fret: cC, shape: 'C' });
  opts.sort((a,b) => a.fret - b.fret || (a.shape==='G'?-1:1));
  return opts;
}
function getYoutubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function nextSunday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 0 : 7 - day;
  d.setDate(d.getDate() + diff);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
let serviceDate = nextSunday();

function sundayWeekOfMonth(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDate();
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const firstSunday = first.getDay() === 0 ? 1 : 8 - first.getDay();
  const weekNum = Math.floor((day - firstSunday) / 7) + 1;
  const labels = ['1st','2nd','3rd','4th','5th'];
  return labels[weekNum - 1] || weekNum + 'th';
}
function formatServiceDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ord = sundayWeekOfMonth(dateStr);
  return `${ord} Sunday — ${months[d.getMonth()]} ${d.getDate()}`;
}

// Save current active song to the library
window.saveToLibrary = () => {
  const s = songs[active];
  const title = s.title && s.title !== `Song ${active+1}` ? s.title : null;
  if (!title) {
    alert('Give this song a title before saving to the library.');
    return;
  }

  // Check if a song with the same title already exists
  const existing = Object.entries(library).find(([,v]) => v.title.toLowerCase() === title.toLowerCase());
  if (existing) {
    if (!confirm(`"${title}" is already in the library. Overwrite it with the current chords?`)) return;
    // Overwrite
    const [existingKey] = existing;
    set(ref(db, 'library/' + existingKey), {
      title: s.title,
      keys: s.keys,
      sections: { ...s.sections },
      savedAt: Date.now()
    }).then(() => {
      flashSaveBtn();
      document.getElementById('syncIndicator').textContent = `"${s.title}" updated in library`;
    });
    return;
  }

  push(libraryRef, {
    title: s.title,
    keys: s.keys,
    sections: { ...s.sections },
    savedAt: Date.now()
  }).then(() => {
    flashSaveBtn();
    document.getElementById('syncIndicator').textContent = `"${s.title}" saved to library`;
  });
};

function flashSaveBtn() {

  songs[slotIndex] = {

    keys: song.keys || ['—'],
    sections: { ...defaultSongs[0].sections, ...song.sections },

    notes: songs[slotIndex].notes || '',

  const toIndex = fromIndex + direction;

  if (toIndex < 0 || toIndex >= songs.length) return;

  const temp = songs[fromIndex];
  songs[fromIndex] = songs[toIndex];
  songs[toIndex] = temp;

  if (active === fromIndex) {
    active = toIndex;
  } else if (active === toIndex) {
    active = fromIndex;
  }

  saveToFirebase();
  render();
};

window.toggleKey = k => {

      s.keys.sort((a,b)=>KEYS.indexOf(a)-KEYS.indexOf(b));

        <span class="chord-preview-chords">${line.map(p => p.chord).join('  ')}</span>

    ).join('');
    return `<div class="chord-preview-key-block">
      ${keys.length > 1 ? `<div class="chord-preview-key-label">${k}</div>` : ''}

  }).join('');

  const tabBar = document.getElementById('tabBar');

    const show = mode === 'zed' || songHasContent(s, i) || i === active;
    if (!show) return '';

    return `<button class="tab-btn ${i === active ? 'active' : ''}" onclick="setTab(${i})" title="${s.title || 'Song ' + (i + 1)}">${i + 1}</button>`;
  }).join('');
}

function renderPanel() {
  if (mode === 'lineup') { document.getElementById('mainPanel').innerHTML = renderLineup(); return; }
  if (mode === 'schedule') { document.getElementById('mainPanel').innerHTML = renderSchedule(); return; }
  if (mode === 'library') { document.getElementById('mainPanel').innerHTML = renderLibraryScreen(); return; }
  document.getElementById('mainPanel').innerHTML =
    mode==='zed' ? renderZed() : mode==='band' ? renderBand() : renderCapo();
  if (mode === 'zed') {
    setTimeout(() => {
      document.querySelectorAll('.section-input, .notes-input').forEach(el => {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      });
    }, 0);
  }
}

// ── RENDER FUNCTIONS ───────────────────────────────────

function renderLineup() {
  const rows = songs.map((s, i) => {
    const hasTitle = s.title && s.title !== `Song ${i+1}`;
    const hasAnySections = SECTIONS.some(sec => s.sections[sec]);
    const keyLabel = s.keys.length && s.keys[0] !== '—' ? s.keys.join(' / ') : null;
    if (!hasTitle && !hasAnySections) return '';
    const leaderOpts = LEADERS.map(l =>
      `<option value="${l}" ${s.leader===l?'selected':''}>${l||'—'}</option>`
    ).join('');
    return `<div class="lineup-song-row">
      <span class="lineup-num">${i+1}</span>
      <div class="lineup-card">
        <div class="lineup-info">
          <div class="lineup-song-name">${s.title||'Song '+(i+1)}</div>
          <div class="lineup-song-key" style="${keyLabel?'':'color:#d1d5db;font-style:italic;'}">${keyLabel?'Key of '+keyLabel:'No key yet'}</div>
          <div class="lineup-leader-row">
            <span class="lineup-leader-label">Worship Lead:</span>
            <select id="leader-${i}" class="leader-select${s.leader?' picked':''}" onchange="onLeaderChange(${i}, this.value)">${leaderOpts}</select>
          </div>
          <textarea class="lineup-notes-input${s.notes?' has-content':''}" rows="1" placeholder="Notes.."
            onblur="onLineupNotesBlur(${i}, this)" oninput="autoGrow(this);updateNotesStyle(this)">${s.notes||''}</textarea>
          <div class="overview-notes${s.notes?' has-content':''}">${s.notes?s.notes.replace(/</g,'&lt;'):''}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const hasAny = songs.some((s,i) => {
    const hasTitle = s.title && s.title !== `Song ${i+1}`;
    return hasTitle || SECTIONS.some(sec=>s.sections[sec]);
  });

  const rosterHtml = INSTRUMENTS.map(inst => {
    const val = roster[inst.key] || '';
    const opts = inst.members.map(m =>
      `<option value="${m}" ${val===m?'selected':''}>${m||'—'}</option>`
    ).join('');
    return `<div class="roster-row">
      <span class="roster-instrument">${inst.label}</span>
      <select id="roster-${inst.key}" class="roster-select${val?' assigned':''}" onchange="onRosterChange('${inst.key}', this.value)">${opts}</select>
    </div>`;
  }).join('');

  return `<div class="lineup-screen${overviewMode?' overview':''}">
    <div class="lineup-header">
      <span class="overview-date"></span>
      ${scheduleData.serviceTime && !playlistMode ? `<span class="lineup-service-time">${scheduleData.serviceTime.replace(/</g,'&lt;')}</span>` : ''}
      <div class="lineup-header-actions">
        <button class="copy-lineup-btn" onclick="copyLineup()">Copy</button>
        <button class="playlist-btn${playlistMode?' active':''}" onclick="togglePlaylist()">Playlist</button>
        <button id="overviewBtn" class="overview-btn${overviewMode?' active':''}" onclick="toggleOverview()" title="Overview">☰</button>
      </div>
    </div>
    ${playlistMode ? renderPlaylistView() : (hasAny ? rows : '<div class="lineup-empty">Add song titles and content to see them here.</div>')}
  </div>
  <div class="band-roster"${(overviewMode || playlistMode)?' style="display:none"':''}>
    <div class="band-roster-title">Band this Sunday</div>
    <div class="roster-grid">${rosterHtml}</div>
  </div>
  <div class="lineup-reset-wrap"${(overviewMode || playlistMode)?' style="display:none"':''}>
    <button class="reset-sunday-btn" onclick="resetSunday()">Reset Sunday</button>
  </div>`;
}

function renderZed() {
  const s = songs[active];
  return `<div class="song-panel">
    <div class="panel-header" style="display:block;">
<div class="edit-title-row">
  <input class="song-title-input" value="${s.title}" placeholder="Song title..."
    onblur="onTitleBlur(this.value)" />
</div>

<div class="edit-reorder-row">
  <button class="edit-reorder-btn" onclick="moveSong(${active}, -1, event)" ${active === 0 ? 'disabled' : ''}>
    ⇦ move left
  </button>

  <span class="edit-reorder-label">Song ${active + 1}</span>

  <button class="edit-reorder-btn" onclick="moveSong(${active}, 1, event)" ${active === songs.length - 1 ? 'disabled' : ''}>
    move right ⇨
  </button>
</div>

<div class="edit-youtube-row">
  <input class="edit-youtube-input" placeholder="Paste YouTube link..."
    value="${s.youtube || ''}"
    onblur="onYoutubeBlur(${active}, this.value)" />

  <button id="saveToLibBtn" class="save-to-lib-btn" onclick="saveToLibrary()">+ Save to Library</button>
</div>
      <div class="edit-key-row">
        <div class="key-selector">${KEYS.map(k=>
          `<button class="key-btn${k==='—'?' dash':''} ${s.keys.includes(k)?'active':''}" onclick="toggleKey('${k}')">${k}</button>`
        ).join('')}</div>
        <button class="reset-btn" onclick="clearChords(${active})" title="Reset this song">clear</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sections">${SECTIONS.map(sec=>`
      <div class="section-row">
        <span class="section-label">${sec}</span>
        <div>
          <textarea class="section-input" rows="1" placeholder="${sec==='intro'?'e.g. 1 5 6 4&#10;1 6 4 5':''}"
            onblur="onSectionBlur('${sec}', this.value)" oninput="autoGrow(this)">${s.sections[sec]||''}</textarea>
          <div class="chord-preview-wrap" id="preview-${sec}">${buildPreviewHtml(s.sections[sec]||'', s.keys)}</div>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderBand() {
  const s = songs[active];
  const filled = SECTIONS.filter(sec => s.sections[sec]);
  const realKeys = s.keys.filter(k => k !== '—');
  const keyBlocks = realKeys.length === 0
    ? '<div class="empty-section" style="color:#d1d5db;font-style:italic;">No key yet.</div>'
    : realKeys.map((k, ki) => {
        const sections = filled.map(sec => {
          const lines = numToLines(s.sections[sec], k);
          const linesHtml = lines.map(line =>
            `<div class="band-chord-line">${line.map(p=>
              `<div class="band-chord-group"><span class="band-chord">${p.chord}</span><span class="band-num">${p.num}</span></div>`
            ).join('')}</div>`
          ).join('');
          return `<div class="band-section"><div class="band-section-name">${sec}</div>${linesHtml}</div>`;
        }).join('');
        return `<div class="band-key-block ${ki > 0 ? 'band-key-block--divider' : ''}">
          <div class="band-key-header">Key of ${k}</div>
          <div class="band-sections">${sections || '<div class="empty-section">No chords yet.</div>'}</div>
        </div>`;
      }).join('');
  const bandMeta = s.notes ? `<div style="font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:4px 9px;margin-top:4px;">${s.notes.replace(/</g,'&lt;')}</div>` : '';
  return `<div class="band-screen">
    <div class="band-song-title">${s.title}</div>
    ${bandMeta}
    <div style="margin-top:${bandMeta?'12px':'0'}">${keyBlocks}</div>
  </div>`;
}

function renderCapo() {
  const s = songs[active];
  const filled = SECTIONS.filter(sec => s.sections[sec]);
  const capoMeta = s.notes ? `<div style="font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:4px 9px;margin-top:4px;">${s.notes.replace(/</g,'&lt;')}</div>` : '';
  const realKeys = s.keys.filter(k => k !== '—');
  const capoOptionsHtml = realKeys.length === 0
    ? '<div class="empty-section" style="color:#d1d5db;font-style:italic;">No key yet.</div>'
    : realKeys.map((songKey, ki) => {
        const opts = getCapoOptions(songKey);
        if (!opts.length) return `<div class="capo-key-header">Key of ${songKey}</div><div class="empty-section">No capo within fret 8.</div>`;
        const cards = opts.map(opt => {
          const fretLabel = opt.fret===0?'No capo':`Capo ${ORDINAL[opt.fret]} fret`;
          const sectionsHtml = filled.map(sec => {
            const lines = numToLines(s.sections[sec], songKey).map(line =>
              line.map(p => ({num: p.num, chord: transposeChord(p.chord, opt.fret)}))
            );
            const linesHtml = lines.map(line =>
              `<div class="capo-chord-line">${line.map(p=>
                `<div class="capo-chord-group"><span class="capo-chord">${p.chord}</span><span class="capo-num">${p.num}</span></div>`
              ).join('')}</div>`
            ).join('');
            return `<div class="capo-section-block"><div class="capo-section-name">${sec}</div>${linesHtml}</div>`;
          }).join('');
          return `<div class="capo-card">
            <div class="capo-fret">${fretLabel}<span>· play ${opt.shape} shapes</span></div>
            ${sectionsHtml||'<div class="empty-section" style="margin-top:8px;font-size:13px">No chords yet.</div>'}
          </div>`;
        }).join('');
        return `<div>
          <div class="capo-key-header">Key of ${songKey}</div>${cards}
          ${ki<realKeys.length-1?'<div class="capo-key-divider"></div>':''}
        </div>`;
      }).join('');
  return `<div class="capo-screen">
    <div class="capo-song-title">${s.title}</div>
    ${capoMeta}
    <div style="margin-top:${capoMeta?'12px':'0'}"><div class="capo-options">${capoOptionsHtml}</div></div>
  </div>`;
}

// ── LIBRARY RENDER ─────────────────────────────────────

function renderLibraryScreen() {
  const count = Object.keys(library).length;
  return `<div class="library-screen">
    <div class="library-header">
      <span class="library-title">Song Library · ${count} song${count===1?'':'s'}</span>
      <input class="library-search" id="librarySearch" placeholder="Search songs…"
        oninput="onLibrarySearch(this.value)" />
    </div>
    <div id="libraryList">${buildLibraryListHtml('')}</div>
  </div>`;
}

function buildLibraryListHtml(query) {
  const entries = Object.entries(library)
    .sort((a, b) => (a[1].title||'').localeCompare(b[1].title||''))
    .filter(([,v]) => !query || v.title.toLowerCase().includes(query));

  if (!entries.length) {
    return query
      ? `<div class="library-empty">No songs match "${query}".</div>`
      : `<div class="library-empty">No songs saved yet. Open a song in Edit mode and tap "+ Save to Library".</div>`;
  }

  return entries.map(([key, song]) => {
    const keys = (song.keys || ['—']).filter(k => k !== '—');
    const keyLabel = keys.length ? keys.join(' / ') : 'No key';
    const sectionCount = SECTIONS.filter(sec => song.sections && song.sections[sec]).length;

    return `<div class="library-song-row">
      <div class="library-song-info">
        <div class="library-song-name">${song.title||'Untitled'}</div>
        <div class="library-song-keys">Key of ${keyLabel}</div>
      </div>
      <div class="library-actions">
        <button class="lib-load-btn" onclick="promptLoadLibrarySong('${key}')">Load</button>
        <button class="lib-delete-btn" onclick="deleteFromLibrary('${key}')" title="Remove from library">Del</button>
      </div>
    </div>`;
  }).join('');
}

window.renderLibraryList = (query) => {
  const el = document.getElementById('libraryList');
  if (el) el.innerHTML = buildLibraryListHtml(query || '');
};

// ── SCHEDULE ───────────────────────────────────────────
let scheduleData = { serviceTime: '', checks: {} };
const scheduleRef = ref(db, 'schedule');
onValue(scheduleRef, snap => {
  const val = snap.val();
  if (val) scheduleData = { serviceTime: val.serviceTime||'', checks: val.checks||{} };
  if (mode === 'schedule' || mode === 'lineup') renderPanel();
});

function saveSchedule() { set(scheduleRef, scheduleData); }
window.onServiceTimeBlur = v => { scheduleData.serviceTime = v; saveSchedule(); };
window.onScheduleCheck = (rowKey, slot, checked) => {
  if (!scheduleData.checks[rowKey]) scheduleData.checks[rowKey] = {};
  scheduleData.checks[rowKey][slot] = checked;
  saveSchedule();
};

function renderSchedule() {
  const SLOTS = ['fri-pm', 'sat-am', 'sat-pm'];
  const SLOT_LABELS = ['Fri PM', 'Sat AM', 'Sat PM'];
  const worshipLeads = [...new Set(songs.map(s => s.leader).filter(Boolean))];
  const rows = [];
  rows.push({ type: 'group', label: 'Worship Lead' });
  worshipLeads.forEach((name, i) => rows.push({ type: 'row', key: 'lead-' + i, name }));
  rows.push({ type: 'group', label: 'Band' });
  INSTRUMENTS.forEach(inst => {
    const assigned = roster[inst.key] || '';
    rows.push({ type: 'row', key: 'inst-' + inst.key, name: assigned, role: inst.label });
  });
  const tableRows = rows.map(r => {
    if (r.type === 'group') return `<tr><td colspan="4" class="schedule-role-group">${r.label}</td></tr>`;
    const checks = scheduleData.checks[r.key] || {};
    const nameDisplay = r.name
      ? `${r.name}${r.role ? `<span style="font-size:11px;color:#9ca3af;font-weight:400;margin-left:5px;">${r.role}</span>` : ''}`
      : `<span style="color:#d1d5db;font-style:italic;font-size:12px;">${r.role || '—'}</span>`;
    const checkboxes = SLOTS.map((slot) =>
      `<td class="schedule-check-cell"><input type="checkbox" class="schedule-check" ${checks[slot]?'checked':''}
        onchange="onScheduleCheck('${r.key}','${slot}',this.checked)" /></td>`
    ).join('');
    return `<tr><td class="schedule-name-cell">${nameDisplay}</td>${checkboxes}</tr>`;
  }).join('');
  return `<div class="schedule-screen">
    <input class="schedule-service-input" placeholder="e.g. 9pm Saturday"
      value="${(scheduleData.serviceTime||'').replace(/"/g,'&quot;')}"
      onblur="onServiceTimeBlur(this.value)" />
    <table class="schedule-table">
      <thead><tr><th></th>${SLOT_LABELS.map(l=>`<th>${l}</th>`).join('')}</tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
  </div>`;
}

// ── MAIN RENDER ────────────────────────────────────────
window.render = render;
window.autoGrow = el => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };

function render() {
  renderTabs();
  renderPanel();
  renderDatePill();
  setTimeout(() => {
    document.querySelectorAll('.section-input, .lineup-notes-input').forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    });
  }, 0);
}

// ── BROADCAST ─────────────────────────────────────────
let senderPanelOpen = false;
let currentBroadcastMsg = '';

const broadcastRef = ref(db, 'broadcast');

// Listen for broadcast changes — fires on ALL devices
onValue(broadcastRef, snap => {
  const val = snap.val();
  const msg = val && val.message ? val.message : '';
  currentBroadcastMsg = msg;
  renderBroadcastOverlay(msg);
  updateClearBtn(msg);
});

function renderBroadcastOverlay(msg) {
  const overlay = document.getElementById('broadcastOverlay');
  const rvcmBtn = document.querySelector('.rvcm-btn');
  if (!overlay) return;

  if (!msg) {
    overlay.style.display = 'none';
    overlay.innerHTML = '';
    if (rvcmBtn) rvcmBtn.classList.remove('live');
    return;
  }

  // Show live dot on RVCM button
  if (rvcmBtn) rvcmBtn.classList.add('live');

  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="broadcast-overlay" onclick="dismissBroadcastOverlay(event)">
      <div class="broadcast-box">
        <div class="broadcast-msg">${msg.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
        <button class="broadcast-dismiss" onclick="dismissBroadcastOverlay()">Okay bro</button>
      </div>
    </div>`;
}

// Dismiss only locally — doesn't clear Firebase (others can still see it)
window.dismissBroadcastOverlay = (e) => {
  if (e && e.target !== e.currentTarget) return;
  const overlay = document.getElementById('broadcastOverlay');
  if (overlay) { overlay.style.display = 'none'; overlay.innerHTML = ''; }
};

// Send: write to Firebase → fires onValue on all devices
window.sendBroadcast = () => {
  const input = document.getElementById('broadcastInput');
  const msg = input ? input.value.trim() : '';
  if (!msg) return;
  set(broadcastRef, { message: msg, sentAt: Date.now() });
  // Don't clear the input so you can see what you sent; show Clear btn
};

// Clear: wipes the message from Firebase → overlay disappears for everyone
window.clearBroadcast = () => {
  set(broadcastRef, { message: '', sentAt: null });
  const input = document.getElementById('broadcastInput');
  if (input) { input.value = ''; input.style.height = 'auto'; }
};

function updateClearBtn(msg) {
  const btn = document.getElementById('broadcastClearBtn');
  if (btn) btn.style.display = msg ? 'block' : 'none';
}

window.toggleSenderPanel = () => {
  senderPanelOpen = !senderPanelOpen;
  const panel = document.getElementById('broadcastSender');
  const toggleBtn = document.getElementById('broadcastToggleBtn');
  if (panel) panel.classList.toggle('hidden', !senderPanelOpen);
  if (toggleBtn) toggleBtn.classList.toggle('open', senderPanelOpen);
  if (senderPanelOpen) {
    setTimeout(() => {
      const input = document.getElementById('broadcastInput');
      if (input) {
        // Pre-fill with active broadcast if one exists
        if (currentBroadcastMsg && !input.value) input.value = currentBroadcastMsg;
        input.focus();
      }
    }, 50);
  }
};

window.autoGrowBroadcast = el => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};
</script>
</body>
